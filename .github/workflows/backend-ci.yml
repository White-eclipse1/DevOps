name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-validate:
    name: Pruebas unitarias + dry-run bundle
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        working-directory: backend
        run: npm ci

      - name: Pruebas unitarias con cobertura
        working-directory: backend
        run: npm run test:coverage

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ github.sha }}
          path: backend/coverage/
          retention-days: 7

      - name: Dry-run bundle (valida compilacion sin deploy)
        working-directory: backend
        run: npx wrangler deploy --dry-run --env production --outdir dist
