name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-validate:
    name: Pruebas unitarias + dry-run bundle
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            backend/axiom-tail/package-lock.json

      - name: Instalar dependencias (Worker principal)
        working-directory: backend
        run: npm ci

      - name: Instalar dependencias (axiom-tail)
        working-directory: backend/axiom-tail
        run: npm ci

      - name: Pruebas unitarias
        working-directory: backend
        run: npm test

      - name: Dry-run bundle (valida compilacion sin deploy)
        working-directory: backend
        run: npx wrangler deploy --dry-run --env production --outdir dist

      - name: Dry-run bundle axiom-tail
        working-directory: backend/axiom-tail
        run: npx wrangler deploy --dry-run --env production --outdir dist
