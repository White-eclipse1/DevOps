name: Backend Deploy — Dev

on:
  push:
    branches: [develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy-dev.yml"
  workflow_dispatch:

concurrency:
  group: backend-deploy-dev
  cancel-in-progress: false

jobs:
  test:
    name: Pruebas unitarias
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm test
        working-directory: backend

  deploy:
    name: Deploy Worker → art-worker-dev
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        working-directory: backend
        run: npm ci

      - name: Deploy a Dev
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env dev
