name: Backend Deploy — Prod

on:
  push:
    branches: [main]
    paths:
      - "modulos/workers/**"
      - ".github/workflows/backend-deploy-prod.yml"
  workflow_dispatch:

concurrency:
  group: backend-deploy-prod
  cancel-in-progress: false

jobs:
  test:
    name: Pruebas unitarias
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: modulos/workers/package-lock.json
      - run: npm ci
        working-directory: modulos/workers
      - run: npm test
        working-directory: modulos/workers

  deploy:
    name: Deploy Worker → art-worker (production)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: modulos/workers/package-lock.json

      - name: Instalar dependencias
        working-directory: modulos/workers
        run: npm ci

      - name: Deploy a Production
        working-directory: modulos/workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env production

      - name: Smoke — health check Production
        run: |
          URL="https://art-worker.f7aaab86d474fca548d8d9c1e8695390.workers.dev/health"
          echo "Checking $URL"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            [ "$STATUS" = "200" ] && echo "OK ($STATUS)" && exit 0
            echo "Intento $i: $STATUS — reintentando en 5s..."
            sleep 5
          done
          echo "Smoke test failed" && exit 1
