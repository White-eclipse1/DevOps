name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancela runs anteriores del mismo PR/branch para no acumular jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend

jobs:
  validate-and-build:
    name: Validar contenido, types y build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Validar manifest de obras
        run: npm run validate

      - name: Type-check + tests unitarios
        run: npm test

      - name: Build de producción (Vite)
        run: npm run build

      - name: Subir build como artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7