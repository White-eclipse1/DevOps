name: Docker

on:
  push:
    branches: [main]
    paths:
      - "docker/**"
      - "frontend/scripts/**"
      - "frontend/assets/data/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

# Solo un run a la vez para que las tags no choquen
concurrency:
  group: docker-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Build y push imagen tooling
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Si los secrets no existen (fork, primer push), no rompemos el repo entero
    if: ${{ vars.SKIP_DOCKER != 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Metadata de imagen (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/galeria-viva-tooling
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=raw,value={{date 'YYYYMMDD-HHmm'}}

      - name: Build y push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max