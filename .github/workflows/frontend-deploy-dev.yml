name: Frontend CI — Dev

on:
  push:
    branches: [develop]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy-dev.yml"
  pull_request:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend

jobs:
  validate-and-build:
    name: Validar, probar y construir Frontend (Dev)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Validar manifest + pruebas unitarias
        run: npm run validate && npm test

      - name: Build de produccion (Vite)
        run: npm run build
