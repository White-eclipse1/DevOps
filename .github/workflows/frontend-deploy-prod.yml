name: Frontend Deploy — Prod

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy-prod.yml"
  workflow_dispatch:

concurrency:
  group: frontend-deploy-prod
  cancel-in-progress: false

defaults:
  run:
    working-directory: frontend

jobs:
  validate-and-build:
    name: Validar, probar y construir Frontend (Prod)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Validar manifest
        run: npm run validate

      - name: Pruebas unitarias
        run: npm test

      - name: Build de produccion (Vite)
        run: npm run build

      - name: Subir build como artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-prod-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

  deploy:
    name: Deploy Frontend Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate-and-build]
    environment: production

    steps:
      - name: Descargar build
        uses: actions/download-artifact@v4
        with:
          name: frontend-prod-dist-${{ github.sha }}
          path: frontend/dist

      - name: Deploy a Cloudflare Pages Production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3 pages deploy dist --project-name paaginaludos-devops --branch main
