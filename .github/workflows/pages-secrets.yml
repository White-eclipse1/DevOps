name: Sync Pages Secrets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages-secrets.yml"

concurrency:
  group: sync-pages-secrets
  cancel-in-progress: false

jobs:
  sync:
    name: Configurar secrets de Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear archivo temporal de secrets
        shell: bash
        run: |
          {
            printf 'AXIOM_TOKEN_FRONTEND=%s\n' "$AXIOM_TOKEN_FRONTEND"
            printf 'VITE_AXIOM_INGEST_URL=%s\n' "$VITE_AXIOM_INGEST_URL"
          } > pages-secrets.env
        env:
          AXIOM_TOKEN_FRONTEND: ${{ secrets.AXIOM_TOKEN_FRONTEND }}
          VITE_AXIOM_INGEST_URL: ${{ secrets.VITE_AXIOM_INGEST_URL }}

      - name: Subir secrets a Cloudflare Pages Production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3 pages secret bulk pages-secrets.env --project-name paaginaludos-devops --env production

      - name: Subir secrets a Cloudflare Pages Preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3 pages secret bulk pages-secrets.env --project-name paaginaludos-devops --env preview

      - name: Limpiar archivo temporal
        if: always()
        run: rm -f pages-secrets.env
