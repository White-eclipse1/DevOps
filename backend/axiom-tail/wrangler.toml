name = "axiom-tail"
main = "src/index.js"
compatibility_date = "2026-01-01"

[observability]
enabled = true

# Secrets: printf '%s' "$TOKEN" | npx wrangler secret put AXIOM_TOKEN --env <dev|production>

[env.dev]
name = "axiom-tail-dev"
vars = { AXIOM_DATASET = "galeria-backend" }

[env.production]
name = "axiom-tail"
vars = { AXIOM_DATASET = "galeria-backend" }
